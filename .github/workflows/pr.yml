name: PR

on:
  pull_request:
    branches: [dev, main]

permissions:
  contents: read
  packages: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Compile
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GITHUB_ACTOR: ${{ secrets.GH_PACKAGES_USER }}
      GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Packages credentials
        run: |
          mkdir -p ~/.gradle
          cat <<EOF > ~/.gradle/gradle.properties
          gpr.user=${GITHUB_ACTOR}
          gpr.key=${GITHUB_TOKEN}
          EOF

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Compile all modules
        run: |
          ./gradlew \
            :design:assembleRelease \
            :resources:assembleRelease \
            :components:assembleRelease \
            :maps:assembleRelease \
            :bridges:assembleRelease \
            --no-daemon \
            --no-configuration-cache \
            --stacktrace \
            -Dorg.gradle.workers.max=2 \
            "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8" \
            "-Dkotlin.daemon.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m"
